# sonar-project.properties
# SonarQube project configuration for secure-app

sonar.projectKey=secure-app
sonar.projectName=Secure CI/CD Pipeline Demo
sonar.projectVersion=1.0

# Source directory
sonar.sources=.

# Exclude non-application files from analysis
sonar.exclusions=**/*.yaml,**/*.yml,**/*.toml,**/*.md,**/*.txt,\
                 **/Dockerfile,**/.git/**,**/node_modules/**

# Python specific
sonar.python.version=3.12
